<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misu.pro — In manutenzione</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f1f5f9;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -2px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      color: #64748b;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>Sito in manutenzione</h1>
    <p class="subtitle">Stiamo lavorando per portarti qualcosa di speciale.<br>Torna presto.</p>
    <div class="badge">
      <div class="dot"></div>
      Lavori in corso
    </div>
  </div>
</body>
</html>
